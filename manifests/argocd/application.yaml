apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-springboot
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/aboubakertounli/GitOps-Approach.git'
    targetRevision: main
    path: manifests/k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
